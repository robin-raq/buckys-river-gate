<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 301 364" width="301" height="364" role="img" aria-label="Beaver mascot waving">
  <title>Beaver  waving</title>
  <style>
    @media (prefers-reduced-motion: no-preference) {
      .beaver-root { animation: wave-bob 1.2s ease-in-out infinite; transform-origin: 150px 300px; }
      .wave-paw { animation: paw-wave 0.7s ease-in-out infinite; transform-origin: 72px 210px; }
    }
    @keyframes wave-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes paw-wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-22deg); }
      50% { transform: rotate(8deg); }
      75% { transform: rotate(-18deg); }
    }
  </style>
  <g class="beaver-root">
    <g class="tail">
      <path fill="#502d16" stroke="#000" stroke-width="4" stroke-linejoin="round" d="M48 248s-95-76 26-98c68-22 42 94 42 94l-15 4z"/>
    </g>
    <ellipse cx="150" cy="248" rx="118" ry="108" fill="#784421" stroke="#000" stroke-width="4"/>
    <g class="head">
      <path fill="#784421" stroke="#000" stroke-width="4" stroke-linejoin="round" d="M150 88c-38 0-68 30-68 68s30 68 68 68 68-30 68-68-30-68-68-68z"/>
      <ellipse cx="108" cy="72" rx="22" ry="20" fill="#784421" stroke="#000" stroke-width="4"/>
      <ellipse cx="192" cy="72" rx="22" ry="20" fill="#784421" stroke="#000" stroke-width="4"/>
      <ellipse cx="108" cy="72" rx="10" ry="9" fill="#502d16"/>
      <ellipse cx="192" cy="72" rx="10" ry="9" fill="#502d16"/>
      <ellipse cx="122" cy="138" rx="20" ry="22" fill="#fff" stroke="#000" stroke-width="3"/>
      <ellipse cx="178" cy="138" rx="20" ry="22" fill="#fff" stroke="#000" stroke-width="3"/>
      <circle cx="126" cy="142" r="9" fill="#000"/>
      <circle cx="182" cy="142" r="9" fill="#000"/>
      <g class="buck-teeth">
        <path fill="#3d2518" stroke="#000" stroke-width="2" d="M130 158 Q150 150 170 158 L168 184 Q150 192 132 184 Z"/>
        <rect x="135" y="162" width="12" height="22" rx="2.5" fill="#fff" stroke="#000" stroke-width="2.5"/>
        <rect x="154" y="162" width="12" height="22" rx="2.5" fill="#fff" stroke="#000" stroke-width="2.5"/>
        <ellipse cx="150" cy="154" rx="12" ry="8" fill="#502d16" stroke="#000" stroke-width="2.5"/>
      </g>
    </g>
    <g class="wave-paw">
      <ellipse cx="72" cy="218" rx="26" ry="32" fill="#784421" stroke="#000" stroke-width="4" transform="rotate(28 72 218)"/>
      <circle cx="58" cy="188" r="20" fill="#784421" stroke="#000" stroke-width="4"/>
    </g>
    <ellipse cx="118" cy="318" rx="52" ry="38" fill="#784421" stroke="#000" stroke-width="4"/>
    <ellipse cx="182" cy="318" rx="52" ry="38" fill="#784421" stroke="#000" stroke-width="4"/>
    <g fill="#502d16" stroke="#000" stroke-width="4">
      <ellipse cx="108" cy="332" rx="15" ry="10"/>
      <ellipse cx="128" cy="332" rx="15" ry="10"/>
      <ellipse cx="172" cy="332" rx="15" ry="10"/>
      <ellipse cx="192" cy="332" rx="15" ry="10"/>
    </g>
  </g>
</svg>
