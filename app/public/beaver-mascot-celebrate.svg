<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 301 364" width="301" height="364" role="img" aria-label="Beaver mascot celebrating">
  <title>Beaver  celebrating</title>
  <style>
    @media (prefers-reduced-motion: no-preference) {
      .beaver-root { animation: celebrate-hop 0.75s ease-in-out infinite; transform-origin: 150px 300px; }
      .spark-a { animation: spin-spark 1.2s linear infinite; transform-origin: center; }
      .spark-b { animation: spin-spark 1.6s linear infinite reverse; transform-origin: center; }
      .spark-c { animation: pulse-spark 0.75s ease-in-out infinite; }
    }
    @keyframes celebrate-hop {
      0%, 100% { transform: translateY(0) scale(1); }
      35% { transform: translateY(-14px) scale(1.04); }
      55% { transform: translateY(-6px) scale(1.02); }
    }
    @keyframes spin-spark {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-spark {
      0%, 100% { opacity: 0.5; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1.15); }
    }
  </style>
  <g class="beaver-root">
    <g class="tail">
      <path fill="#502d16" stroke="#000" stroke-width="4" stroke-linejoin="round" d="M48 248s-95-76 26-98c68-22 42 94 42 94l-15 4z"/>
    </g>
    <ellipse cx="150" cy="248" rx="118" ry="108" fill="#784421" stroke="#000" stroke-width="4"/>
    <g class="head">
      <path fill="#784421" stroke="#000" stroke-width="4" stroke-linejoin="round" d="M150 88c-38 0-68 30-68 68s30 68 68 68 68-30 68-68-30-68-68-68z"/>
      <ellipse cx="108" cy="72" rx="22" ry="20" fill="#784421" stroke="#000" stroke-width="4"/>
      <ellipse cx="192" cy="72" rx="22" ry="20" fill="#784421" stroke="#000" stroke-width="4"/>
      <ellipse cx="108" cy="72" rx="10" ry="9" fill="#502d16"/>
      <ellipse cx="192" cy="72" rx="10" ry="9" fill="#502d16"/>
      <ellipse cx="122" cy="138" rx="20" ry="22" fill="#fff" stroke="#000" stroke-width="3"/>
      <ellipse cx="178" cy="138" rx="20" ry="22" fill="#fff" stroke="#000" stroke-width="3"/>
      <circle cx="126" cy="142" r="9" fill="#000"/>
      <circle cx="182" cy="142" r="9" fill="#000"/>
      <g class="buck-teeth">
        <path fill="#3d2518" stroke="#000" stroke-width="2" d="M122 156 Q150 144 178 156 L175 188 Q150 198 125 188 Z"/>
        <rect x="133" y="162" width="13" height="24" rx="2.5" fill="#fff" stroke="#000" stroke-width="2.5"/>
        <rect x="155" y="162" width="13" height="24" rx="2.5" fill="#fff" stroke="#000" stroke-width="2.5"/>
        <ellipse cx="150" cy="150" rx="13" ry="8" fill="#502d16" stroke="#000" stroke-width="2.5"/>
      </g>
    </g>
    <ellipse cx="118" cy="318" rx="52" ry="38" fill="#784421" stroke="#000" stroke-width="4"/>
    <ellipse cx="182" cy="318" rx="52" ry="38" fill="#784421" stroke="#000" stroke-width="4"/>
    <g fill="#502d16" stroke="#000" stroke-width="4">
      <ellipse cx="108" cy="332" rx="15" ry="10"/>
      <ellipse cx="128" cy="332" rx="15" ry="10"/>
      <ellipse cx="172" cy="332" rx="15" ry="10"/>
      <ellipse cx="192" cy="332" rx="15" ry="10"/>
    </g>
    <g class="spark-a" transform="translate(52 48)">
      <path fill="#ffe566" d="M0-10 2.5-2.5 10 0 2.5 2.5 0 10-2.5 2.5-10 0-2.5-2.5z"/>
    </g>
    <g class="spark-b" transform="translate(238 62)">
      <path fill="#ffb3c6" d="M0-8 2-2 8 0 2 2 0 8-2 2-8 0-2-2z"/>
    </g>
    <g class="spark-c" transform="translate(248 28)">
      <path fill="#7ec8ff" d="M0-6 1.5-1.5 6 0 1.5 1.5 0 6-1.5 1.5-6 0-1.5-1.5z"/>
    </g>
  </g>
</svg>
