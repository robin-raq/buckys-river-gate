<?xml version="1.0" encoding="UTF-8"?>
<!-- Bucky kawaii bust � big eyes, blush, chibi proportions -->
<svg viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .bk { fill: none; stroke: #6b4e3d; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
      .fur { fill: #c99a6b; }
      .snout { fill: #ffe8d4; }
      .hat { fill: #ffe566; }
      .hat-d { fill: #ffd43b; }
      .over { fill: #7ec8ff; }
      .wood { fill: #f0d9a8; }
      .metal { fill: #e2e8f0; }
      .metal-d { fill: #b8c4d4; }
      .mouth { fill: #e8a0a8; }
      .eye-w { fill: #ffffff; }
      .pupil { fill: #4a3728; }
      .btn { fill: #ffd666; }
      .blush { fill: #ffb3c6; opacity: 0.55; }
    </style>
    <radialGradient id="eye-shine" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </radialGradient>
  </defs>

  <g id="Tail" opacity="0"><ellipse cx="20" cy="160" rx="16" ry="10" class="fur"/></g>

  <g id="Body">
    <g id="Left_Arm" transform="translate(30, 118)">
      <ellipse cx="0" cy="10" rx="10" ry="13" class="fur bk" transform="rotate(-18)"/>
      <circle id="Left_Paw" cx="-3" cy="24" r="8" class="snout bk"/>
    </g>
    <ellipse cx="80" cy="128" rx="30" ry="22" class="fur bk"/>
    <g id="Legs" opacity="0"><rect x="64" y="150" width="12" height="20" class="fur"/></g>
    <g id="Feet" opacity="0"><ellipse cx="72" cy="172" rx="12" ry="5" class="fur"/></g>
  </g>

  <g id="Overalls">
    <path d="M50 108 L50 124 Q50 152 64 168 L80 171 Q96 168 110 152 L110 124 L110 108 Q80 102 50 108 Z" class="over bk"/>
    <path d="M58 108 L54 94 Q80 88 106 94 L102 108" class="over bk"/>
    <circle cx="58" cy="104" r="3.5" class="btn bk"/>
    <circle cx="102" cy="104" r="3.5" class="btn bk"/>
    <g id="Nameplate">
      <rect x="58" y="116" width="44" height="16" rx="6" class="wood bk"/>
      <text x="80" y="127" text-anchor="middle" fill="#6b4e3d" font-family="Fredoka, Arial, sans-serif" font-size="8" font-weight="700">BUCKY</text>
    </g>
  </g>

  <g id="Head_Group" transform="translate(80, 58)">
    <circle cx="0" cy="0" r="44" class="fur bk"/>
    <g id="Ears">
      <circle cx="-34" cy="-12" r="11" class="fur bk"/>
      <circle cx="-34" cy="-12" r="5.5" fill="#ffd4e8"/>
      <circle cx="34" cy="-12" r="11" class="fur bk"/>
      <circle cx="34" cy="-12" r="5.5" fill="#ffd4e8"/>
    </g>
    <ellipse cx="0" cy="12" rx="32" ry="26" class="snout bk"/>
    <ellipse cx="-22" cy="10" rx="9" ry="6" class="blush"/>
    <ellipse cx="22" cy="10" rx="9" ry="6" class="blush"/>
    <g id="Whiskers" opacity="0.35">
      <path d="M-30 8 L-40 6 M-30 14 L-42 14" class="bk" stroke-width="1.2"/>
      <path d="M30 8 L40 6 M30 14 L42 14" class="bk" stroke-width="1.2"/>
    </g>
    <g id="Eyes">
      <ellipse class="bucky-eye bk" cx="-18" cy="0" rx="14" ry="16" fill="url(#eye-shine)"/>
      <ellipse class="bucky-eye bk" cx="18" cy="0" rx="14" ry="16" fill="url(#eye-shine)"/>
      <ellipse cx="-18" cy="2" rx="8" ry="9" class="pupil"/>
      <ellipse cx="18" cy="2" rx="8" ry="9" class="pupil"/>
      <circle cx="-22" cy="-4" r="3.5" fill="#fff" opacity="0.95"/>
      <circle cx="14" cy="-4" r="3.5" fill="#fff" opacity="0.95"/>
      <circle cx="-14" cy="4" r="1.8" fill="#fff" opacity="0.7"/>
      <circle cx="22" cy="4" r="1.8" fill="#fff" opacity="0.7"/>
    </g>
    <ellipse id="Nose" cx="0" cy="14" rx="4" ry="3" class="pupil"/>
    <g id="Mouth">
      <path d="M-10 22 Q0 28 10 22" fill="none" stroke="#6b4e3d" stroke-width="2" stroke-linecap="round"/>
      <path d="M-5 20 Q0 16 5 20" fill="#fff" opacity="0.6"/>
    </g>
    <g id="Mouth_Frown">
      <path d="M-8 24 Q0 20 8 24" fill="none" stroke="#6b4e3d" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-12" cy="12" r="2" fill="#8ec8ff" opacity="0.5"/>
    </g>
  </g>

  <g id="Hard_Hat" transform="translate(80, 14)">
    <path d="M-44 34 Q0 -10 44 34 L40 26 Q0 2 -40 26 Z" class="hat bk"/>
    <ellipse cx="0" cy="34" rx="48" ry="9" class="hat-d bk"/>
    <ellipse cx="0" cy="10" rx="28" ry="8" fill="#fff" opacity="0.25"/>
    <text x="0" y="26" text-anchor="middle" fill="#6b4e3d" font-family="Fredoka, Arial, sans-serif" font-size="22" font-weight="800">B</text>
  </g>

  <g id="Right_Arm_with_Axe" transform="translate(120, 62)">
    <ellipse cx="0" cy="18" rx="11" ry="15" class="fur bk" transform="rotate(-22)"/>
    <ellipse cx="12" cy="4" rx="9" ry="12" class="fur bk" transform="rotate(-48)"/>
    <circle cx="20" cy="-8" r="9" class="snout bk"/>
    <g id="Axe" transform="translate(24, -32) rotate(-8)">
      <rect x="-2" y="0" width="4" height="38" rx="2" fill="#d4a574" stroke="#6b4e3d" stroke-width="1.5"/>
      <path d="M2 2 L20 2 L18 -10 L6 -10 Z" class="metal bk"/>
      <path d="M6 -10 L18 -10 L19 -4 L7 -4 Z" class="metal-d"/>
    </g>
  </g>

  <g id="Log_Prop" transform="translate(28, 108)">
    <rect width="22" height="8" rx="4" class="wood bk"/>
    <text x="11" y="6.5" text-anchor="middle" fill="#6b4e3d" font-size="4.5" font-weight="700">1/2</text>
  </g>

  <g id="Thumb_Up" transform="translate(24, 132)">
    <circle r="7" class="snout bk"/>
    <rect x="-2" y="-10" width="4" height="8" rx="2" class="snout bk"/>
  </g>

  <g id="Sparkles">
    <path d="M34 12 L35.5 16 L40 17 L35.5 18 L34 22 L32.5 18 L28 17 L32.5 16 Z" fill="#ffe566"/>
    <path d="M126 8 L127 11 L130 12 L127 13 L126 16 L125 13 L122 12 L125 11 Z" fill="#ffb3c6"/>
    <path d="M138 26 L139 28 L142 29 L139 30 L138 32 L137 30 L134 29 L137 28 Z" fill="#7ec8ff"/>
  </g>
</svg>
